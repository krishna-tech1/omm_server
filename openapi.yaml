openapi: 3.0.3
info:
  title: OMM API
  version: 0.1.0
servers:
  - url: /api
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    websocketToken:
      type: apiKey
      in: query
      name: token
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    AuthOtpRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
    AuthOtpResponse:
      type: object
      properties:
        message:
          type: string
    AuthVerifyRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string
    AuthVerifyResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
        name:
          type: string
        avatar_url:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time
    UpdateProfileRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        avatar_url:
          type: string
    Challenge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        merchant_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        target_miles:
          type: number
        expires_at:
          type: string
          format: date-time
        duration_days:
          type: integer
        reward:
          type: string
        reward_image_url:
          type: string
        created_at:
          type: string
          format: date-time
    CreateChallengeRequest:
      type: object
      required: [title, target_miles, expires_at]
      properties:
        title:
          type: string
        description:
          type: string
        target_miles:
          type: number
        expires_at:
          type: string
          format: date-time
        duration_days:
          type: integer
        reward:
          type: string
        reward_image_url:
          type: string
    ChallengeRegistration:
      type: object
      properties:
        id:
          type: string
          format: uuid
        challenge_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        registered_at:
          type: string
          format: date-time
        status:
          type: string
    StartSessionRequest:
      type: object
      required: [start_time, start_lat, start_lng]
      properties:
        challenge_ids:
          type: array
          items:
            type: string
            format: uuid
        start_time:
          type: string
          format: date-time
        start_lat:
          type: number
        start_lng:
          type: number
        steps_start:
          type: integer
          format: int32
        miles_start:
          type: number
    StartSessionResult:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        challenge_id:
          type: string
          format: uuid
        hmac_secret:
          type: string
          description: Secret used to HMAC-sign websocket GPS+steps points.
        status:
          type: string
        start_time:
          type: string
          format: date-time
    StartSessionResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/StartSessionResult"
    StopSessionRequest:
      type: object
      required: [session_ids, end_time, end_lat, end_lng, total_miles]
      properties:
        session_ids:
          type: array
          items:
            type: string
            format: uuid
        end_time:
          type: string
          format: date-time
        end_lat:
          type: number
        end_lng:
          type: number
        steps_end:
          type: integer
          format: int32
        total_miles:
          type: number
          description: Fallback client-reported miles. If Redis stream state exists, server-computed websocket distance is used instead.
    StopSessionResult:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        challenge_id:
          type: string
          format: uuid
        status:
          type: string
        distance_miles:
          type: number
        coupon_code:
          type: string
        coupon_status:
          type: string
    StopSessionResponse:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/StopSessionResult"
    SessionStreamPoint:
      type: object
      required: [lat, lng, timestamp, seq, signature]
      description: Client-to-server websocket message. Signature payload is `session_id|timestamp_utc_rfc3339nano|lat_7dp|lng_7dp|seq|steps`, HMAC-SHA256 hex signed with the session `hmac_secret`.
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        timestamp:
          type: string
          format: date-time
        seq:
          type: integer
          format: int64
          minimum: 1
          description: Strictly increasing client sequence number.
        steps:
          type: integer
          format: int32
          minimum: 0
          description: Cumulative device step count for the session; must be non-decreasing.
        signature:
          type: string
          description: Lowercase hex HMAC-SHA256 signature for this point.
    SessionStreamProgress:
      type: object
      description: Server-to-client websocket progress message.
      properties:
        type:
          type: string
          enum: [progress]
        session_id:
          type: string
          format: uuid
        challenge_id:
          type: string
          format: uuid
        distance_miles:
          type: number
        target_miles:
          type: number
        steps:
          type: integer
          format: int32
        seq:
          type: integer
          format: int64
        completed:
          type: boolean
    SessionStreamChallengeCompleted:
      allOf:
        - $ref: "#/components/schemas/SessionStreamProgress"
        - type: object
          properties:
            type:
              type: string
              enum: [challenge_completed]
            message:
              type: string
              example: "challenge #c4a11e4e-0000-0000-0000-000000000001 complete!"
            coupon_code:
              type: string
            coupon_status:
              type: string
    SessionStreamError:
      type: object
      properties:
        type:
          type: string
          enum: [error]
        message:
          type: string
    PresignUploadRequest:
      type: object
      required: [purpose, content_type]
      properties:
        purpose:
          type: string
          description: "avatar or merchant_logo"
        content_type:
          type: string
        file_extension:
          type: string
    PresignUploadResponse:
      type: object
      properties:
        upload_url:
          type: string
        public_url:
          type: string
        object_key:
          type: string
        method:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        expires_at:
          type: string
          format: date-time
    MerchantRegisterRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        category:
          type: string
        address_lat:
          type: number
        address_lng:
          type: number
        logo_url:
          type: string
        description:
          type: string
    Merchant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
        address_lat:
          type: number
        address_lng:
          type: number
        logo_url:
          type: string
        description:
          type: string
    MerchantDashboard:
      type: object
      properties:
        total_challenges:
          type: integer
          format: int64
        total_redemptions:
          type: integer
          format: int64
        active_customers:
          type: integer
          format: int64
    MerchantChallenge:
      allOf:
        - $ref: "#/components/schemas/Challenge"
        - type: object
          properties:
            participants:
              type: integer
              format: int64
    CreateEmployeeRequest:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
        phone:
          type: string
    Employee:
      type: object
      properties:
        id:
          type: string
          format: uuid
        merchant_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        code:
          type: string
        status:
          type: string
    Coupon:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        status:
          type: string
        challenge_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        issued_at:
          type: string
          format: date-time
        redeemed_at:
          type: string
          format: date-time
        redeemed_by_employee_id:
          type: string
          format: uuid
        barcode_base64:
          type: string
    RedeemCouponRequest:
      type: object
      required: [coupon_code, employee_code]
      properties:
        coupon_code:
          type: string
        employee_code:
          type: string
    RedeemCouponResponse:
      type: object
      properties:
        coupon_id:
          type: string
          format: uuid
        employee_id:
          type: string
          format: uuid
        redeemed_at:
          type: string
          format: date-time
        coupon_code:
          type: string
    AdminStats:
      type: object
      properties:
        total_users:
          type: integer
          format: int64
        total_merchants:
          type: integer
          format: int64
        total_distance_miles:
          type: number
    SyncSessionPointsRequest:
      type: object
      required: [points]
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/SessionStreamPoint"
    BanMerchantRequest:
      type: object
      properties:
        remark:
          type: string
    Category:
      type: object
      properties:
        name:
          type: string
        created_at:
          type: string
          format: date-time
    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
    UpdateCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
paths:
  /auth/otp:
    post:
      summary: Send OTP
      operationId: sendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthOtpRequest"
      responses:
        "200":
          description: OTP created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthOtpResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/verify:
    post:
      summary: Verify OTP
      operationId: verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyRequest"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/profile:
    post:
      summary: Update profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/coupons:
    get:
      summary: List coupons
      operationId: listCoupons
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Coupon list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /uploads/presign:
    post:
      summary: Presign upload
      operationId: presignUpload
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignUploadRequest"
      responses:
        "200":
          description: Presigned upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignUploadResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/start:
    post:
      summary: Start session
      operationId: startSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSessionRequest"
      responses:
        "200":
          description: Session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSessionResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/stop:
    post:
      summary: Stop session
      operationId: stopSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopSessionRequest"
      responses:
        "200":
          description: Session stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopSessionResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/{id}/stream:
    get:
      summary: Stream GPS and steps for an active session
      operationId: streamSession
      description: |
        WebSocket endpoint. Authenticate with `Authorization: Bearer <jwt>` for native clients, or `?token=<jwt>` for browser clients.

        Clients send `SessionStreamPoint` JSON messages. The server validates ownership, HMAC signatures, monotonic sequence/timestamps, GPS speed, and step rate. Live distance/step state is cached in Redis to avoid per-point session/challenge DB reads. When target miles are reached before session stop, the server sends a `challenge_completed` message and issues the coupon idempotently.
      x-websocket: true
      security:
        - bearerAuth: []
        - websocketToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: JWT token for browser websocket handshakes when Authorization headers are unavailable.
      responses:
        "101":
          description: WebSocket upgrade accepted. Messages are JSON objects matching SessionStreamProgress, SessionStreamChallengeCompleted, or SessionStreamError.
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sessions/{id}/sync:
    post:
      summary: Sync offline session points
      operationId: syncSessionPoints
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncSessionPointsRequest"
      responses:
        "200":
          description: Progress or challenge completed event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStreamProgress"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /challenges:
    get:
      summary: List challenges
      operationId: listChallenges
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Challenge list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Challenge"
    post:
      summary: Create challenge
      operationId: createChallenge
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChallengeRequest"
      responses:
        "200":
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"
  /challenges/{id}:
    post:
      summary: Update challenge
      operationId: updateChallenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChallengeRequest"
      responses:
        "200":
          description: Challenge updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Challenge"
  /challenges/{id}/register:
    post:
      summary: Register for challenge
      operationId: registerChallenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeRegistration"
  /merchants:
    get:
      summary: Get merchant profile
      operationId: getMerchantProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Merchant profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
    post:
      summary: Update merchant profile (for current merchant user)
      operationId: updateMerchantProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantRegisterRequest"
      responses:
        "200":
          description: Merchant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
  /merchants/all:
    get:
      summary: List all merchants (Admin)
      operationId: listAllMerchants
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Merchants list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Merchant"
  /merchants/nearby:
    get:
      summary: List nearby merchants within 30 miles
      operationId: listNearbyMerchants
      security:
        - bearerAuth: []
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
      responses:
        "200":
          description: List of nearby merchants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Merchant"
  /merchants/register:
    post:
      summary: Register merchant
      operationId: registerMerchant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantRegisterRequest"
      responses:
        "200":
          description: Merchant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"
  /merchants/dashboard:
    get:
      summary: Merchant dashboard
      operationId: merchantDashboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantDashboard"
  /merchants/challenges:
    get:
      summary: List merchant challenges
      operationId: listMerchantChallenges
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Merchant challenges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MerchantChallenge"
  /merchants/employees:
    get:
      summary: List employees
      operationId: listEmployees
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Employee list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      summary: Create employee
      operationId: createEmployee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "200":
          description: Employee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
  /coupons/redeem:
    post:
      summary: Redeem coupon
      operationId: redeemCoupon
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemCouponRequest"
      responses:
        "200":
          description: Coupon redeemed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemCouponResponse"
  /admin/stats:
    get:
      summary: Admin stats
      operationId: adminStats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
  /admin/merchants/{id}/ban:
    post:
      summary: Ban a merchant and delete their challenges
      operationId: banMerchant
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BanMerchantRequest"
      responses:
        "200":
          description: Merchant banned
        "401":
          description: Unauthorized
  /categories:
    get:
      summary: List categories
      operationId: listCategories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      summary: Create category
      operationId: createCategory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
  /categories/{name}:
    patch:
      summary: Update category
      operationId: updateCategory
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      summary: Delete category
      operationId: deleteCategory
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
